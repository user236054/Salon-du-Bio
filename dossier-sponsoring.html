<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Lecture du dossier sponsoring SIBIO 2026</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./site-shell.css" />
    <style>
      body {
        min-height: 100vh;
        background: #f4fbf6;
      }

      .reader-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .reader-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px clamp(16px, 4vw, 48px);
        background: #ffffff;
        border-bottom: 1px solid rgba(15, 81, 50, 0.12);
      }

      .reader-header h1 {
        margin: 0;
        color: #145c3a;
        font-size: clamp(1.05rem, 2vw, 1.45rem);
      }

      .reader-header a {
        color: #145c3a;
        font-weight: 800;
        text-decoration: none;
      }

      .reader-frame {
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 76px);
        border: 0;
        background: #ffffff;
      }

      @media (max-width: 640px) {
        .reader-header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="reader-shell">
      <header class="reader-header">
        <h1>Dossier sponsoring SIBIO 2026</h1>
        <a href="./exposants-partenaires.html">Retour partenaires</a>
      </header>
      <iframe
        class="reader-frame"
        src="./Dossier de sponsoring SIBIO 2026.pdf#toolbar=0&navpanes=0&scrollbar=1"
        title="Lecture du dossier sponsoring SIBIO 2026"
      ></iframe>
    </main>
  </body>
</html>
