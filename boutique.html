<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique SIBIO 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --green: #2d5016;
        --green-light: #3f6b22;
        --accent: #c87137;
        --bg: #f5f7f6;
        --card: #ffffff;
        --text: #1f2a1f;
        --muted: #6b6b6b;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* HEADER */
      .header {
        background: linear-gradient(135deg, var(--green), var(--green-light));
        color: white;
        padding: 18px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header h1 {
        font-size: 22px;
        margin: 0;
      }

      .back-btn {
        background: var(--accent);
        color: white;
        padding: 8px 14px;
        border-radius: 999px;
        text-decoration: none;
        font-size: 14px;
      }

      .filters input {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #ddd;
        min-width: 190px;
        outline: none;
        background: white;
      }

      .filters input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 2px rgba(45, 80, 22, 0.15);
      }

      /* alignement filters */
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 18px;
        align-items: center;
        justify-content: flex-start;

        position: sticky;
        top: 70px; /* en dessous du header */
        z-index: 900;
        background: var(--bg);
      }

      /* bouton panier dans filters */
      .cart-btn {
        display: flex;
        align-items: center;
        gap: 6px;

        margin-left: auto;

        padding: 12px 16px;
        border-radius: 12px;

        background: linear-gradient(135deg, #f7c948, #f0b429);

        cursor: pointer;
        font-weight: 600;
        font-size: 14px;

        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        transition: 0.25s;

        position: relative; /* IMPORTANT pour badge */
      }

      .cart-btn:hover {
        transform: translateY(-2px);
        border-color: yellow;
      }

      /* CUSTOM SELECT */
      .custom-select {
        position: relative;
        min-width: 190px;
        user-select: none;
      }

      .select-selected {
        background: linear-gradient(145deg, #ffffff, #f3f7f3);
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #ddd;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .select-selected:after {
        content: "▾";
        color: var(--green);
        margin-left: 10px;
      }

      .select-items {
        position: absolute;
        top: 110%;
        left: 0;
        right: 0;
        background: white;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        display: none;
        z-index: 50;
        pointer-events: auto;
        overflow: hidden;
      }
      .custom-select {
        position: relative;
        min-width: 190px;
        user-select: none;
      }

      .select-items div {
        padding: 10px 12px;
        cursor: pointer;
      }

      .select-items div:hover {
        background: #e8f3e1;
        color: var(--green);
      }

      .select-items.show {
        display: block;
      }

      /* PRODUCTS */
      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 22px;
        padding: 28px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-6px);
      }

      .card img {
        width: 100%;
        height: 170px;
        object-fit: cover;
      }

      .card-content {
        padding: 14px;
      }
      .cart-count {
        position: absolute;
        top: -6px;
        right: -6px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 2px 6px;
        border-radius: 50%;
        display: none;
        font-weight: bold;
      }

      .price {
        color: var(--accent);
        font-weight: 700;
      }

      .badge {
        display: inline-block;
        margin-top: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        background: #e8f3e1;
        color: var(--green);
      }
      /* ACTIONS */
      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
      }

      /* BOUTON PRINCIPAL */
      .btn-order {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--green), var(--green-light));
        color: white;
        transition: 0.25s;
      }

      .btn-order:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(45, 80, 22, 0.3);
      }

      /* ICÔNE PANIER */
      .btn-cart {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        border: none;
        cursor: pointer;

        background: rgba(179, 197, 21, 0.26); /* fond blanc */
        color: var(--green); /* icône bien visible */

        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;

        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08); /* relief */
        transition: 0.25s;
      }

      .btn-cart:hover {
        background-color: yellow;
        transform: scale(1.08);
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>🛒 Boutique SIBIO 2026</h1>
      <a href="index.html" class="back-btn">Accueil</a>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="Rechercher un produit..." />

      <div class="custom-select" data-filter="category">
        <div class="select-selected">Toutes les catégories</div>
        <div class="select-items">
          <div data-value="">Toutes les catégories</div>
          <div data-value="alimentaire">Alimentaire</div>
          <div data-value="cosmetique">Cosmétique</div>
          <div data-value="artisanat">Artisanat</div>
        </div>
      </div>

      <div class="custom-select" data-filter="region">
        <div class="select-selected">Toutes les régions</div>
        <div class="select-items" id="regionList"></div>
      </div>

      <div class="custom-select" data-filter="price">
        <div class="select-selected">Tous les prix</div>
        <div class="select-items">
          <div data-value="">Tous les prix</div>
          <div data-value="1">- 5 000 FCFA</div>
          <div data-value="2">5 000 - 10 000 FCFA</div>
          <div data-value="3">10 000+ FCFA</div>
        </div>
      </div>

      <div class="cart-btn" onclick="goToCart()" style="position: relative">
        🛒 <span style="color: white">Panier</span>
        <span id="cart-count" class="cart-count">0</span>
      </div>
    </div>
    <!-- mais quand il retire un produit un produit on remet l'icone du panier pour lui dire qu'il rzajoutr dansle panier -->
    <div class="products" id="productsContainer"></div>

    <script>
      const products = [
        {
          name: "Miel Bio",
          price: 3000,
          category: "alimentaire",
          region: "Abidjan",
          img: "https://images.unsplash.com/photo-1587049352851-8d4e89133924",
        },
        {
          name: "Savon Naturel",
          price: 2000,
          category: "cosmetique",
          region: "Yamoussoukro",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRf2IcxndKG3qfMqQrA1iS5QGEd8qQHKd_chg&s",
        },
        {
          name: "Café Bio",
          price: 7000,
          category: "alimentaire",
          region: "San-Pédro",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRjQqtVirbr0GESyw15LitUgcXbELffRWPvog&s",
        },
        {
          name: "Huile de coco",
          price: 12000,
          category: "cosmetique",
          region: "Gbêkê",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgeh9NVrPq4iBH5fMpok0vaWnXDJIg3gTO_Q&s",
        },
        {
          name: "Sac artisanal",
          price: 9000,
          category: "artisanat",
          region: "Tonkpi",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9_L1fSqI1NXW4awEqHYf0tOVS1RsJ-e7XHw&s",
        },
        {
          name: "Légumes Frais Bio",
          price: 500,
          category: "alimentaire",
          region: "Sassandra",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9_L1fSqI1NXW4awEqHYf0tOVS1RsJ-e7XHw&s",
        },
        {
          name: "Beure de Kariter",
          price: 200,
          category: "cosmétique",
          region: "Tonkpi",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9_L1fSqI1NXW4awEqHYf0tOVS1RsJ-e7XHw&s",
        },
        {
          name: "Fruit Bio",
          price: 2000,
          category: "aliment",
          region: "Tonkpi",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9_L1fSqI1NXW4awEqHYf0tOVS1RsJ-e7XHw&s",
        },
        {
          name: "Colier en Feuille",
          price: 1500,
          category: "artisanat",
          region: "Tonkpi",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT9_L1fSqI1NXW4awEqHYf0tOVS1RsJ-e7XHw&s",
        },
      ];

      const regions = [
        "Abidjan",
        "Yamoussoukro",
        "San-Pédro",
        "Gbêkê",
        "Hambol",
        "Poro",
        "Tonkpi",
      ];

      let filters = {
        category: "",
        region: "",
        price: "",
      };

      /* REGION LIST */
      const regionList = document.getElementById("regionList");
      regions.forEach((r) => {
        const div = document.createElement("div");
        div.textContent = r;
        div.dataset.value = r;
        regionList.appendChild(div);
      });

      /* CUSTOM DROPDOWN */
      document.querySelectorAll(".custom-select").forEach((select) => {
        const selected = select.querySelector(".select-selected");
        const items = select.querySelector(".select-items");

        // OUVERTURE AU SURVOL
        select.addEventListener("mouseenter", () => {
          document.querySelectorAll(".select-items").forEach((el) => {
            if (el !== items) el.classList.remove("show");
          });
          items.classList.add("show");
        });

        // GARDE OUVERT TANT QU'ON EST DEDANS
        select.addEventListener("mouseleave", () => {
          items.classList.remove("show");
        });

        // SELECTION OPTION
        items.querySelectorAll("div").forEach((option) => {
          option.addEventListener("click", () => {
            selected.textContent = option.textContent;
            items.classList.remove("show");

            const type = select.dataset.filter;
            filters[type] = option.dataset.value || "";
            filterProducts();
          });
        });
      });

      // fermeture si clic hors dropdown
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".custom-select")) {
          document
            .querySelectorAll(".select-items")
            .forEach((el) => el.classList.remove("show"));
        }
      });

      /* PRODUCTS */

      /* PRODUCTS */
      function display(list) {
        const container = document.getElementById("productsContainer");
        container.innerHTML = "";

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        list.forEach((p) => {
          const isInCart = cart.some((item) => item.name === p.name);

          container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <h3>${p.name}</h3>
          <p>${p.region}</p>
          <span class="badge">${p.category}</span>
          <p class="price">${p.price} FCFA</p>

          <div class="actions">
            <button class="btn-order"
              onclick="goToOrder('${p.name}', ${p.price}, '${p.img}')">
              Commander
            </button>

            <button class="btn-cart"
              onclick="toggleCart('${p.name}', ${p.price}, '${p.img}', this)">
              ${isInCart ? "✔" : "🛒"}
            </button>
          </div>
        </div>
      </div>
    `;
        });
      }

      function goToOrder(name, price, img) {
        const url = `commande.html?name=${encodeURIComponent(name)}&price=${price}&img=${encodeURIComponent(img)}`;
        window.location.href = url;
      }

      /* COMPTEUR PANIER */
      function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const count = cart.length;

        const badge = document.getElementById("cart-count");

        if (count > 0) {
          badge.style.display = "block";
          badge.textContent = count;
        } else {
          badge.style.display = "none";
        }
      }

      /* TOGGLE PANIER (AJOUT / RETRAIT) */
      function toggleCart(name, price, img, btn) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let index = cart.findIndex((item) => item.name === name);

        if (index !== -1) {
          // retirer
          cart.splice(index, 1);
          btn.textContent = "🛒";
        } else {
          // ajouter
          cart.push({
            name,
            price,
            img,
            qty: 1,
          });
          btn.textContent = "✔";
        }

        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
      }

      /* FILTRE */
      function filterProducts() {
        const search = document.getElementById("search").value.toLowerCase();

        const filtered = products.filter((p) => {
          return (
            p.name.toLowerCase().includes(search) &&
            (filters.category === "" || p.category === filters.category) &&
            (filters.region === "" || p.region === filters.region) &&
            (filters.price === "" ||
              (filters.price === "1" && p.price < 5000) ||
              (filters.price === "2" && p.price >= 5000 && p.price <= 10000) ||
              (filters.price === "3" && p.price > 10000))
          );
        });

        display(filtered);
      }

      document
        .getElementById("search")
        .addEventListener("input", filterProducts);

      /* NAVIGATION */
      function goToCart() {
        window.location.href = "panier.html";
      }

      /* INIT */
      display(products);
      updateCartCount();
    </script>
  </body>
</html>
